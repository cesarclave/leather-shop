version: 2

sources:
  - name: raw_leather_shop
    description: "Source data for the leather shop project."
    database: "{{ env_var(\"DBT_RAW_DB\") }}"
    schema: raw
    tables:
      - name: customers
        description: "This table contains customer information."
        loaded_at_field: "_loaded_at"
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: cust_number
            description: "Unique identifier for a customer."
            tests:
              - unique
              - not_null
          - name: fullname
            description: "Full name of the customer."
          - name: email_address
            description: "Customer s email address."
          - name: city
            description: "City where the customer lives."
          - name: country
            description: "Country where the customer lives."
          - name: updated_at
            description: "Timestamp of the last update."
          - name: _loaded_at
            description: "Timestamp when the data was loaded."
          - name: src
            description: "Source environment (DEV or PRD)."

      - name: products
        description: "This table contains product information."
        loaded_at_field: "_loaded_at"
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: sku
            description: "Unique identifier for a product."
            tests:
              - unique
              - not_null
          - name: item_desc
            description: "Name of the product."
          - name: category
            description: "Product category."
          - name: material_type
            description: "Main material of the product."
          - name: unit_price
            description: "Price of the product."
          - name: updated_at
            description: "Timestamp of the last update."
          - name: _loaded_at
            description: "Timestamp when the data was loaded."
          - name: src
            description: "Source environment (DEV or PRD)."

      - name: orders
        description: "This table contains transaction data."
        loaded_at_field: "_loaded_at"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        columns:
          - name: order_ref
            description: "Unique identifier for a transaction."
            tests:
              - unique
              - not_null
          - name: cust_number
            description: "Identifier of the customer who made the transaction."
          - name: sku
            description: "Identifier of the product in the transaction."
          - name: qty
            description: "Quantity of the product purchased."
          - name: ordered_at
            description: "Timestamp of the transaction."
          - name: _loaded_at
            description: "Timestamp when the data was loaded."
          - name: src
            description: "Source environment (DEV or PRD)."